<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>eshopEZ</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<nav class="navbar">

<div class="logo">eshopEZ</div>

<ul>

<li>Home</li>
<li>Categories</li>
<li>New Arrivals</li>

</ul>

<input class="search" placeholder="Search products">

</nav>


<section class="hero">

<h1>Future of Online Shopping</h1>

<p>Discover premium gadgets & accessories</p>

<button class="cta">Shop Now</button>

</section>


<section class="products">

<div class="card">

<h3>Smartphone</h3>
<p>₹15000</p>
<button onclick="addToCart('Smartphone')">Add to Cart</button>

</div>


<div class="card">

<h3>Laptop</h3>
<p>₹55000</p>
<button onclick="addToCart('Laptop')">Add to Cart</button>

</div>


<div class="card">

<h3>Headphones</h3>
<p>₹2000</p>
<button onclick="addToCart('Headphones')">Add to Cart</button>

</div>

</section>


<div class="cart">

<h2>Cart</h2>

<ul id="cart-items"></ul>

</div>


<footer>

<p>Designed & Developed with ❤️ by Ambikesh, Anushka, & Arvind</p>

</footer>

<script src="script.js"></script>

</body>

</html>
