<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - eshopEZ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">
    <!-- Navigation (simplified for auth page) -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1 class="logo-text">eshopEZ</h1>
            </div>
            <a href="index.html" class="back-home">Back to Home</a>
        </div>
    </nav>

    <!-- Login Form -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Login to eshopEZ</h2>
                <form class="auth-form">
                    <div class="input-group">
                        <input type="email" id="login-email" required>
                        <label for="login-email">Email</label>
                    </div>
                    <div class="input-group">
                        <input type="password" id="login-password" required>
                        <label for="login-password">Password</label>
                    </div>
                    <button type="submit" class="auth-btn">Login</button>
                </form>
                <div class="social-login">
                    <button class="social-btn"><i class="fab fa-google"></i> Google</button>
                    <button class="social-btn"><i class="fab fa-facebook"></i> Facebook</button>
                </div>
                <p class="auth-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>Designed & Developed with ❤️ by Ambikesh, Anushka, & Arvind</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
