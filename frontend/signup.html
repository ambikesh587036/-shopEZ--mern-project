<!-- signup.html (bonus, as mentioned in auth) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - eshopEZ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1 class="logo-text">eshopEZ</h1>
            </div>
            <a href="index.html" class="back-home">Back to Home</a>
        </div>
    </nav>

    <!-- Sign Up Form -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Create Account</h2>
                <form class="auth-form">
                    <div class="input-group">
                        <input type="text" id="signup-name" required>
                        <label for="signup-name">Full Name</label>
                    </div>
                    <div class="input-group">
                        <input type="email" id="signup-email" required>
                        <label for="signup-email">Email</label>
                    </div>
                    <div class="input-group">
                        <input type="password" id="signup-password" required>
                        <label for="signup-password">Password</label>
                    </div>
                    <button type="submit" class="auth-btn">Sign Up</button>
                </form>
                <div class="social-login">
                    <button class="social-btn"><i class="fab fa-google"></i> Google</button>
                    <button class="social-btn"><i class="fab fa-facebook"></i> Facebook</button>
                </div>
                <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>Designed & Developed with ❤️ by Ambikesh, Anushka, & Arvind</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
